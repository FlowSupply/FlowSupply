<div class="page">
  <div class="container">
    <form (ngSubmit)="onSubmit()" novalidate>
      <h1>Reset password</h1>
      <p class="helper-text">Enter your email and we will send you a password reset link.</p>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email"
               id="email"
               name="email"
               class="form-control"
               [(ngModel)]="email"
               placeholder="Enter email"
               required />
      </div>

      <div *ngIf="errorMessage.length > 0" class="error-box" role="alert">
        <p class="error-text">{{ errorMessage }}</p>
      </div>

      <div *ngIf="successMessage.length > 0" class="success-box" role="status">
        <p class="success-text">{{ successMessage }}</p>
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Sending...' : 'Send reset link' }}
      </button>

      <div class="logIn">
        <p>Remembered it? <a routerLink="/login" class="sign-up">Sign in</a></p>
      </div>
    </form>
  </div>
</div>
