<div class="page">
  <div class="intro">
    <div class="title">
        <h1 style="font-size: 2em;">Inventory</h1>
        <p>Аvailable stock and product management.</p>
    </div>
  </div>

  <div class="conatiner-fluid searchFilter">
      <input class="form-control" type="text" placeholder="Search products..." aria-label="Search">
      <button class="filterBtn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-funnel" viewBox="0 0 16 16">
              <path d="M1.5 1.5A.5.5 0 0 1 2 1h12a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-.128.334L10 8.692V13.5a.5.5 0 0 1-.342.474l-3 1A.5.5 0 0 1 6 14.5V8.692L1.628 3.834A.5.5 0 0 1 1.5 3.5zm1 .5v1.308l4.372 4.858A.5.5 0 0 1 7 8.5v5.306l2-.666V8.5a.5.5 0 0 1 .128-.334L13.5 3.308V2z"/>
          </svg> Filters
      </button>
  </div>

  <div class="container-fluid suppliersTable">
    <table class="table">
      <thead>
        <tr>
          <th>Product</th>
          <th>SCU</th>
          <th>Category</th>
          <th>Availability</th>
          <th>Minimum</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let product of products">
          <td>{{ product.productName }}</td>
          <td style="color: #6e6e6e;">{{ product.productSCU }}</td>
          <td style="color: #6e6e6e;">{{ product.productCategory }}</td>
          <td>
            <span style="font-weight: bold; color: black;">{{ product.productAvailability }}</span>
            <div 
              class="progress"
              [ngStyle]="{
                'background-color': getLightColor(statusColors[compareAvailabilityToMinimum(product)])
              }"
            >
              <div 
                class="progress-fill"
                [ngStyle]="{
                  'width': getAvailabilityPercentage(product) + '%',
                  'background-color': statusColors[compareAvailabilityToMinimum(product)]
                }">
              </div>
            </div>
          </td>
          <td style="color: #6e6e6e;">{{ product.productMinimum }}</td>
          <td style="text-align:center;">
            <span [ngStyle]="{
              'background-color': statusColors[compareAvailabilityToMinimum(product)],
              'color': 'white',
              'border-radius': '20px',
              'padding': '4px 12px',
              'display': 'inline-flex',
              'width': '70%',
              'height': '50%',
              'align-items': 'center',
              'justify-content': 'center'
            }">{{ product.productStatus }}</span>
          </td>
        </tr>
      </tbody>
    </table>
</div>
