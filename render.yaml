services:
  - type: web
    name: flowsupply-api
    runtime: docker
    branch: emkata
    dockerfilePath: ./SupplyChain.API/Dockerfile
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: Frontend__BaseUrl
        value: https://flowsupply.onrender.com

  - type: static
    name: flowsupply
    branch: emkata
    rootDir: supplyChain
    buildCommand: npm install && npm run build
    staticPublishPath: dist/supplyChain/browser
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
